type: meson
name: howdy
sources:
  - type: git
    branch: beta
    commit: aef35b5
    url: https://github.com/boltgolt/howdy.git
buildflags:
  - "--buildtype=release"
  - "-Dinstall_pam_config=true"
  - "-Dconfig_dir=/etc/howdy"
  - "-Ddlib_data_dir=/etc/dlib"
  - "-Duser_models_dir=/etc/howdy/models"
modules:
  - type: shell
    name: howdy/setup
    commands:
      - chmod 644 /etc/pam.d/*
      - chown root:root /etc/pam.d/*
      - pip3 install dlib --upgrade --break-system-packages --no-cache-dir
      - ln -s $(find / -type f -name pam_howdy.so 2>/dev/null) /usr/lib/x86_64-linux-gnu/security/pam_howdy.so
  - type: shell
    name: howdy/ir-emitter-enable
    commands:
      - |
        wget -q -P /sources \
          $(curl -s https://api.github.com/repos/EmixamPP/linux-enable-ir-emitter/releases/latest \
            | jq -r '.assets[] | select(.name | contains("tar.gz")).browser_download_url') \
      - tar -C / --no-same-owner -m -h -xzf /sources/linux-enable-ir-emitter*.tar.gz
      - rm -f /sources/linux-enable-ir-emitter*.tar.gz
      - systemctl enable linux-enable-ir-emitter
