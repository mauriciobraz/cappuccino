# yaml-language-server: $schema=https://raw.githubusercontent.com/mauriciobraz/vos/refs/heads/main/schemas/recipe.json

id: cappuccino
name: cappuccino

stages:
  - id: build
    base: ghcr.io/vanilla-os/desktop:main
    args: { DEBIAN_FRONTEND: noninteractive }

    addincludes: true
    singlelayer: false

    labels:
      maintainer: Maurício Braz

    runs:
      commands:
        - echo 'APT::Install-Recommends "1";' \
          > /etc/apt/apt.conf.d/01norecommends

    modules:
      - type: shell
        name: system
        commands:
          - lpkg --unlock
          - apt-get update
          - apt-get upgrade -y

      - type: apt
        name: pkg
        sources:
          - path: pkgs.inst

      - name: includes
        type: includes
        includes:
          - modules/warp.yml
          - modules/howdy.yml
          - modules/1password.yml

      - type: shell
        name: comps
        commands:
          - vso completion fish >  /etc/fish/completions/vso.fish
          - apx completion fish >  /etc/fish/completions/apx.fish
          - abroot completion fish >  /etc/fish/completions/abroot.fish

      - type: shell
        name: clean
        commands:
          - apt-get autoremove -y
          - apt-get clean
          - lpkg --lock

      - type: fsguard
        name: fsguard

        GenerateKey: true
        CustomFsGuard: false

        FilelistPaths: ["/usr/bin"]
        FsGuardLocation: "/usr/sbin/FsGuard"

        modules:
          - type: shell
            name: setup
            commands:
              - rm -rf /FsGuard
              - rm -f ./minisign.pub ./minisign.key
              - chmod +x /usr/sbin/init

      - name: clean
        type: shell
        commands:
          - rm -rf /tmp/*
          - rm -rf /sources
          - rm -rf /var/tmp/*

vibversion: 1.0.0
includespath: includes
